<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI French Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI French Poem Generator</h1>
      </header>

      <main>
        <form>
          <input
            type="text"
            placeholder="Enter the topic of the French poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="poem">
          La tombe dit à la rose
          <br />
          Des pleurs dont l'aube t'arrose
        </div>
      </main>

    <footer>This AI project was coded by Monica and is <a href ="https://github.com/topcatski/french-poem-generator" target="_blank">on Github</a> and is <a href ="https://ai-french-poem-generator-monicab.netlify.app/" target="_blank">hosted on Netlify.<footer>
    <script src="src/index.js"></script>
  </body>
</html>
